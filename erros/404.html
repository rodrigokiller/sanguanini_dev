<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - não encontrado · sanguanini.dev</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { box-sizing: border-box; border-radius: 0; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0b0e10; color: #d6e2dc;
      font-family: 'JetBrains Mono', 'Cascadia Mono', ui-monospace, Consolas, monospace;
    }
    .caixa { padding: 24px; max-width: 60ch; }
    .prompt { color: #7f948c; font-size: 13px; margin: 0 0 12px; }
    .prompt .user { color: #34e2a0; }
    h1 { font-size: 44px; margin: 0 0 8px; color: #eaf3ee; letter-spacing: -0.02em; }
    p { color: #7f948c; font-size: 14px; margin: 0 0 20px; line-height: 1.6; }
    a {
      display: inline-block; color: #06110c; background: #34e2a0;
      text-decoration: none; font-weight: 600; font-size: 13px; padding: 10px 18px;
    }
    a:hover { background: #4bf0b1; }
    .caret { display: inline-block; width: 8px; height: 14px; background: #34e2a0; vertical-align: -2px; animation: pisca 1.1s step-end infinite; }
    @keyframes pisca { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .caret { animation: none; } }
  </style>
</head>
<body>
  <div class="caixa">
    <p class="prompt"><span class="user">rodrigo@sanguanini.dev</span>:~$ cat pagina<span class="caret"></span></p>
    <h1>404</h1>
    <p>cat: pagina: arquivo ou diretório não encontrado</p>
    <a href="/">cd ~/</a>
  </div>
</body>
</html>
